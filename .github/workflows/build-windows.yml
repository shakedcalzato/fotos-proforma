name: Build Windows EXE

# Cuándo correr este workflow:
on:
  # En cada push a main (cuando subís cambios) — para iterar rápido.
  push:
    branches: [main]
    # En cada push de tag v* (ej. v1.1) — para liberar release oficial.
    # El último step crea el release en GitHub con el .exe como asset.
    tags: ['v*']
  # Botón "Run workflow" manual desde la UI de GitHub Actions
  workflow_dispatch:

# Permisos para que el último step pueda crear/actualizar releases.
permissions:
  contents: write

jobs:
  build:
    name: Compile .exe with PyInstaller
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compilar a .exe
        run: |
          pyinstaller --onefile --windowed --name FotosProforma --noconfirm main.py
        # --onefile: un solo .exe (más fácil de mandar por WhatsApp/email)
        # --windowed: sin ventana de consola al abrir
        # --name FotosProforma: nombre del binario de salida
        # --noconfirm: no pregunta antes de sobreescribir

      - name: Listar archivos generados (debug)
        run: dir dist
        shell: cmd

      - name: Subir .exe como artifact
        uses: actions/upload-artifact@v4
        with:
          name: FotosProforma-Windows
          path: dist/FotosProforma.exe
          retention-days: 90
          # El artifact queda disponible 90 días para descargar desde
          # la página del workflow run en GitHub.

      # ---- Solo en push de tag: crear/actualizar el release de GitHub
      # ---- con el .exe como asset. Esto activa el auto-update para
      # ---- los usuarios que ya tengan v1.1+ instalada.
      - name: Crear release con el .exe (solo en push de tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # tag_name es implícito (el tag que se está pusheando).
          # name: usa el tag como título por default.
          generate_release_notes: true   # GitHub arma changelog auto
          files: dist/FotosProforma.exe
          fail_on_unmatched_files: true
